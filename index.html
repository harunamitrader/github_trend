<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="毎朝、GitHub Trending の未記事 repo を1本だけ記事化して公開する GitHub Trend Journal。"
    />
    <meta name="theme-color" content="#f7fbff" />
    <title>GitHub Trend Journal</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <a class="hero-link" href="https://github.com/trending" target="_blank" rel="noreferrer">
          GitHub Trending
        </a>
        <p class="eyebrow">Daily Journal</p>
        <h1>毎朝、未記事の GitHub Trending repo を1本だけ記事にする。</h1>
        <p class="hero-copy">
          構成は極力シンプルにしています。最新記事を1本、あとは一覧だけ。毎朝 Codex に
          「今日の記事作って」と頼んで更新する前提の GitHub Pages です。
        </p>
      </header>

      <main class="layout">
        <section class="card intro-card">
          <div class="stats" id="site-stats"></div>
        </section>

        <section class="card latest-card">
          <div class="section-head">
            <p class="eyebrow">Latest</p>
            <h2>最新記事</h2>
          </div>
          <div id="latest-article"></div>
        </section>

        <section class="card archive-card">
          <div class="section-head">
            <p class="eyebrow">Archive</p>
            <h2>記事一覧</h2>
          </div>
          <div id="archive-list" class="archive-list"></div>
        </section>
      </main>

      <footer class="footer">
        <p>
          Source:
          <a href="https://github.com/trending" target="_blank" rel="noreferrer">GitHub Trending</a>
        </p>
      </footer>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
